name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 EOL Nisan 2026'da. Glob desteği (--test) Node 21+ ile geldi.
          # Yerel geliştirme de 22.x üzerinde.
          node-version: 22.x
          cache: 'npm'

      # Pure-JS unit testler için native bağımlılıkları (canvas, sqlite3)
      # derlemeye gerek yok; postinstall script'lerini atlıyoruz.
      - name: Install dependencies (skip native builds)
        run: npm ci --ignore-scripts

      - name: Run unit tests
        run: npm test
